<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Table</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #f0f4f8;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
        }
        form {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            max-width: 800px;
            margin: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .form-row {
            margin-bottom: 15px;
        }
        input, select {
            padding: 8px;
            margin-right: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .submit-btn {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }
        .submit-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <h2>Create Table</h2>

    <form method="POST" action="{{ url_for('create_table') }}">
        <div class="form-row">
            <label>Table Name:</label>
            <input type="text" name="table_name" required>
        </div>
        <div class="form-row">
            <label>Number of Columns:</label>
            <input type="number" name="column_count" min="1" required>
        </div>
        <div class="form-row">
            <input type="submit" value="Next" class="submit-btn">
        </div>
    </form>
</body>
</html>
