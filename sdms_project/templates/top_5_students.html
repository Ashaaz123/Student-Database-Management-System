<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Top 5 Students</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>Top 5 Students by Average Score</h1>

    <a href="{{ url_for('top_5_students', download=1) }}">Download Excel</a>
    <table>
        <thead><tr>{% for col in columns %}<th>{{ col }}</th>{% endfor %}</tr></thead>
        <tbody>
        {% for row in rows %}
            <tr>{% for cell in row %}<td>{{ cell }}</td>{% endfor %}</tr>
        {% endfor %}
        </tbody>
    </table>

    <p><a href="{{ url_for('home') }}">Home</a></p>
</body>
</html>
