<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Joins & Relationships</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>Joins & Relationships</h1>

    <a href="{{ url_for('joins_relationship', download=1) }}">Download Excel</a>
    <table>
        <thead><tr><th>Student ID</th><th>Student Name</th><th>Course Name</th><th>Score</th></tr></thead>
        <tbody>
        {% for sid, name, course, score in data %}
            <tr><td>{{ sid }}</td><td>{{ name }}</td><td>{{ course }}</td><td>{{ score }}</td></tr>
        {% endfor %}
        </tbody>
    </table>

    <p><a href="{{ url_for('home') }}">Home</a></p>
</body>
</html>
